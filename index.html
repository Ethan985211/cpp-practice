<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ 算法刷题训练营</title>
<link rel="icon" href="data:,">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM
   ═══════════════════════════════════════════ */
:root {
  --bg: #0a0e14;
  --surface: #131820;
  --surface2: #1a2030;
  --surface3: #212a3a;
  --border: #2a3548;
  --border-light: #323e55;
  --text: #dde2ea;
  --text2: #7c889e;
  --text3: #58647a;
  --accent: #4da6ff;
  --accent-glow: rgba(77,166,255,.18);
  --accent-soft: rgba(77,166,255,.08);
  --green: #26bb5c;
  --green-soft: rgba(38,187,92,.1);
  --orange: #e0a830;
  --orange-soft: rgba(224,168,48,.1);
  --red: #f2443d;
  --red-soft: rgba(242,68,61,.1);
  --purple: #8b5cf6;
  --radius: 10px;
  --radius-sm: 7px;
  --radius-xs: 5px;
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;
  --mono: "SF Mono","Fira Code","JetBrains Mono",Consolas,monospace;
}
[data-theme="light"] {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #f0f3f8;
  --surface3: #e4e9f2;
  --border: #d5dbe5;
  --border-light: #c8d0db;
  --text: #1a2030;
  --text2: #58647a;
  --text3: #8a97ad;
  --accent: #1a73e8;
  --accent-glow: rgba(26,115,232,.12);
  --accent-soft: rgba(26,115,232,.05);
  --green: #188038;
  --orange: #b8700a;
  --red: #d93025;
  --purple: #7c3aed;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ═══ Navbar ═══ */
.navbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.navbar-inner{max-width:1140px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--text);text-decoration:none;letter-spacing:-.2px}
.brand-icon{font-size:21px;line-height:1}
.brand-sub{font-size:12px;color:var(--text2);font-weight:400}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-stat{font-size:12px;color:var(--text2);padding:5px 12px;background:var(--surface2);border-radius:14px;font-weight:500}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

/* ═══ Account ═══ */
.acct-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:5px 14px;border-radius:16px;font-size:12px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px;font-family:var(--font)}
.acct-btn:hover{border-color:var(--accent);color:var(--accent)}
.acct-btn.logged-in{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.acct-avatar{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.acct-dropdown{position:absolute;top:100%;right:0;margin-top:6px;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.25);padding:8px;z-index:200;display:none}
.acct-dropdown.show{display:block}
.acct-dropdown-item{padding:8px 12px;border-radius:var(--radius-xs);cursor:pointer;font-size:13px;color:var(--text);transition:background .15s;display:flex;align-items:center;gap:8px}
.acct-dropdown-item:hover{background:var(--surface2)}
.acct-dropdown-item.danger{color:var(--red)}
.acct-dropdown-item.danger:hover{background:var(--red-soft)}
.acct-dropdown-divider{height:1px;background:var(--border);margin:6px 0}

/* ═══ Auth Modal ═══ */
.auth-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.auth-modal-overlay.open{display:flex}
.auth-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:380px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.4);animation:modalIn .2s ease}
.auth-modal-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.auth-modal-header h2{font-size:18px;font-weight:700}
.auth-modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;transition:color .15s}
.auth-modal-close:hover{color:var(--text)}
.auth-tabs{display:flex;gap:0;margin:16px 20px 0;border-bottom:1px solid var(--border)}
.auth-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.auth-tab:hover{color:var(--text)}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-body{padding:20px}
.auth-field{margin-bottom:14px}
.auth-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.auth-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:var(--font)}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.auth-input::placeholder{color:var(--text3)}
.auth-error{font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.auth-error.show{display:block}
.auth-submit{width:100%;padding:11px 0;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font)}
.auth-submit:hover{opacity:.9;transform:translateY(-1px)}
.auth-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.auth-info{font-size:11px;color:var(--text2);text-align:center;margin-top:12px}

/* ═══ Knowledge Map ═══ */
.map-wrap{padding:20px 0 2px;overflow-x:auto;display:flex;justify-content:center}
.map-svg{min-width:600px;max-width:100%;height:auto}
.map-node{cursor:pointer;transition:transform .2s}
.map-node:hover{transform:translateY(-1.5px)}
.map-node:hover rect{filter:brightness(1.15)}

/* ═══ Stage Nav ═══ */
.stage-nav{display:flex;gap:8px;overflow-x:auto;padding:0 24px 20px;justify-content:center;flex-wrap:wrap}
.stage-tab{flex-shrink:0;padding:12px 20px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;text-align:center;transition:all .2s;min-width:105px;position:relative}
.stage-tab:hover{border-color:var(--accent);background:var(--accent-soft)}
.stage-tab.active{background:var(--accent-soft);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.stage-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.stage-count{font-size:11px;color:var(--text2)}
.stage-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.stage-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease}
.stage-tab.active .stage-bar-fill{background:linear-gradient(90deg,var(--accent),var(--purple))}

/* ═══ Controls ═══ */
.controls{max-width:1140px;margin:0 auto;padding:0 24px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap::before{content:"\1F50D";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text2);pointer-events:none;z-index:1}
.search-input{width:100%;padding:10px 14px 10px 34px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search-input::placeholder{color:var(--text3)}
.diff-filter{display:flex;gap:5px}
.diff-btn{padding:6px 15px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap;font-weight:500}
.diff-btn:hover{border-color:var(--accent);color:var(--accent)}
.diff-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-filter{display:flex;gap:5px;flex-wrap:wrap}
.cat-btn{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:11px;transition:all .2s;white-space:nowrap}
.cat-btn:hover{border-color:var(--accent);color:var(--text)}
.cat-btn.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}

/* ═══ Stats ═══ */
.stats-row{max-width:1140px;margin:0 auto;padding:0 24px 20px;display:flex;gap:14px;flex-wrap:wrap}
.stat-card{flex:1;min-width:110px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;text-align:center;transition:all .2s}
.stat-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.stat-num{font-size:24px;font-weight:700;color:var(--accent);letter-spacing:-.5px}
.stat-num.green{color:var(--green)}
.stat-label{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}

/* ═══ Problem Grid ═══ */
.container{max-width:1140px;margin:0 auto;padding:0 24px 40px}
.section-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.problem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.problem-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.problem-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.problem-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;transition:all .25s}
.problem-card.status-ac::before{background:var(--green)}
.problem-card.status-read::before{background:var(--accent)}
.problem-card.status-ac{border-color:rgba(38,187,92,.2)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-id{font-size:12px;color:var(--text3);font-weight:600;font-family:var(--mono)}
.card-id-num{font-size:18px;color:var(--accent);font-weight:700}
.diff-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600;letter-spacing:.2px}
.diff-easy{background:var(--green-soft);color:var(--green)}
.diff-medium{background:var(--orange-soft);color:var(--orange)}
.diff-hard{background:var(--red-soft);color:var(--red)}
.card-title{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text);line-height:1.4}
.card-meta{display:flex;gap:14px;font-size:11px;color:var(--text2);margin-bottom:10px}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 9px;border-radius:8px;background:var(--surface2);color:var(--text2);font-weight:500}
.status-marker{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.status-marker.ac{background:var(--green-soft);color:var(--green)}

.empty-state{text-align:center;padding:50px 20px;color:var(--text2);display:none}
.empty-state p{font-size:15px}
.congrats{display:none;text-align:center;padding:24px;margin-bottom:20px;background:var(--green-soft);border:1px solid var(--green);border-radius:var(--radius);animation:slideDown .4s ease}
.congrats p{font-size:15px;color:var(--green);font-weight:600}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

/* ═══ Modal ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:880px;width:100%;max-height:90vh;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5);animation:modalIn .25s ease;display:flex;flex-direction:column}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header-left{display:flex;align-items:center;gap:12px}
.modal-header h2{font-size:19px;font-weight:700}
.modal-close{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:20px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.modal-close:hover{background:var(--red-soft);border-color:var(--red);color:var(--red)}

/* ═══ Modal Tabs ═══ */
.modal-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0;background:var(--surface)}
.modal-tab-btn{flex:1;max-width:160px;padding:12px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;text-align:center}
.modal-tab-btn:hover{color:var(--text);background:var(--surface2)}
.modal-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-tab-icon{font-size:15px;display:block;margin-bottom:2px}
.modal-body{flex:1;overflow-y:auto;padding:20px 24px 24px}
.modal-tab-panel{display:none;animation:fadeIn .25s ease}
.modal-tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.modal-section{margin-bottom:22px}
.modal-section h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.info-item{background:var(--surface2);padding:12px 16px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.info-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.info-value{font-size:13px;font-weight:600;color:var(--text)}
.problem-desc{color:var(--text);line-height:1.8;font-size:14px}
.problem-desc p{margin-bottom:10px}
.io-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:10px}
.io-block h4{font-size:12px;color:var(--accent);margin-bottom:6px}
.io-block pre{margin:0;font-family:var(--mono);font-size:13px;color:var(--text);white-space:pre-wrap;word-break:break-all}

/* ═══ Solution ═══ */
.solution-toggle{display:block;width:100%;padding:12px 16px;background:var(--surface2);border:1px dashed var(--border);border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;text-align:center;transition:all .2s;margin-bottom:10px}
.solution-toggle:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.solution-toggle .arrow{display:inline-block;transition:transform .3s ease;margin-right:6px}
.solution-toggle.open .arrow{transform:rotate(90deg)}
.solution-collapse{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease;opacity:0}
.solution-collapse.expanded{max-height:10000px;opacity:1}
.code-wrapper{position:relative;margin-bottom:14px}
.code-wrapper pre{margin:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow-x:auto}
.code-wrapper code{font-family:var(--mono);font-size:13px;line-height:1.65}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--surface3);border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:var(--radius-xs);cursor:pointer;font-size:12px;transition:all .2s;opacity:0}
.code-wrapper:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.copy-btn.copied{background:var(--green)!important;color:#fff!important;border-color:var(--green)!important}
.explanation{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 18px;line-height:1.8;font-size:13px}
.explanation h4{color:var(--accent);margin-bottom:8px;font-size:13px}
.explanation p{margin-bottom:8px}

/* ═══ Judge ═══ */
.judge-section{margin-bottom:22px}
.judge-section h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.judge-editor-wrap{position:relative;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;background:var(--surface2)}
.judge-editor-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.judge-ln{position:absolute;left:0;top:0;bottom:0;width:44px;background:var(--surface3);border-right:1px solid var(--border);padding:14px 0;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text3);line-height:1.7;overflow:hidden;pointer-events:none;user-select:none}
.judge-editor{width:100%;min-height:220px;padding:14px 16px 14px 52px;background:transparent;color:var(--text);border:none;outline:none;font-family:var(--mono);font-size:13px;line-height:1.7;resize:vertical;tab-size:4}
.judge-editor::placeholder{color:var(--text3)}
.judge-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.judge-submit-btn{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:6px}
.judge-submit-btn:hover{background:#3d93e8;transform:translateY(-1px);box-shadow:0 4px 12px var(--accent-glow)}
.judge-submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.judge-load-btn{padding:8px 16px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;transition:all .2s}
.judge-load-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.judge-results{margin-bottom:16px;display:none}
.judge-results.show{display:block}
.verdict-bar{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:var(--radius-sm);margin-bottom:10px;font-weight:600;font-size:14px}
.verdict-bar.ac{background:var(--green-soft);border:1px solid var(--green);color:var(--green)}
.verdict-bar.wa{background:var(--red-soft);border:1px solid var(--red);color:var(--red)}
.verdict-bar.tle{background:var(--orange-soft);border:1px solid var(--orange);color:var(--orange)}
.verdict-bar.ce{background:rgba(240,136,62,.1);border:1px solid #f0883e;color:#f0883e}
.verdict-bar.re{background:rgba(163,113,247,.1);border:1px solid #a371f7;color:#a371f7}
.verdict-bar.unknown{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.verdict-bar .verdict-icon{font-size:22px}
.verdict-bar .verdict-meta{margin-left:auto;font-size:12px;font-weight:400;opacity:.8}
.verdict-details{font-size:12px}
.verdict-row{display:flex;align-items:center;gap:8px;padding:9px 14px;margin-bottom:4px;background:var(--surface2);border-radius:var(--radius-sm);font-family:var(--mono);font-size:12px}
.verdict-row .v-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.verdict-row .v-dot.ac{background:var(--green)}
.verdict-row .v-dot.wa{background:var(--red)}
.verdict-row .v-dot.tle{background:var(--orange)}
.verdict-row .v-dot.ce{background:#f0883e}
.verdict-row .v-dot.re{background:#a371f7}
.verdict-row .v-label{flex:1}
.verdict-row .v-time{color:var(--text2)}

<script>
// ═══ Data ═══
const allProblems = [...PROBLEMS_STAGE1_4, ...PROBLEMS_STAGE5_7];

const stageIds = [...new Set(allProblems.map(p => p.stage))].sort((a,b) => a-b);
const stageInfo = stageIds.map(sid => {
  const probs = allProblems.filter(p => p.stage === sid);
  return { id: sid, name: probs[0].stageName, count: probs.length };
});

const STAGE_COLORS = [
  '#4da6ff','#26bb5c','#e0a830','#f2443d','#8b5cf6','#f0883e','#36d6e7'
];

let currentStage = stageInfo[0].id;
let currentDiff = "all";
let currentCategory = "all";

// ═══ Account State ═══
const AK = "cpp-auth-token";
var acctToken = sessionStorage.getItem(AK) || localStorage.getItem(AK) || "";
var acctUsername = "";
var acctLoggedIn = false;
var acctMember = false;
var acctMembershipInfo = null;
var acctRole = "user";
var acctAiTrials = { used: 0, remaining: 3 };

async function loadUserFromServer() {
  if (!acctToken) return false;
  try {
    const resp = await fetch(AUTH_URL + "/api/user", {
      headers: {"Authorization": "Bearer " + acctToken}
    });
    if (!resp.ok) { acctToken = ""; localStorage.removeItem(AK); return false; }
    const data = await resp.json();
    if (!data.logged_in) { acctToken = ""; localStorage.removeItem(AK); return false; }
    acctUsername = data.username;
    acctLoggedIn = true;
    acctRole = data.role || "user";
    acctAiTrials = data.ai_trials || { used: 0, remaining: 3 };
    // Store membership info
    if (data.membership && data.membership.member) {
      acctMember = true;
      acctMembershipInfo = data.membership;
    } else {
      acctMember = false;
      acctMembershipInfo = null;
    }
    updateAcctUI();
    return true;
  } catch { return false; }
}

function saveToken(token) {
  acctToken = token;
  if (token) {
    localStorage.setItem(AK, token);
    sessionStorage.setItem(AK, token);
  } else {
    localStorage.removeItem(AK);
    sessionStorage.removeItem(AK);
  }
}

// ═══ Progress (Cloud-Synced) ═══
const PK = "cpp-practice-progress";
function loadProgress() {
  try { const r = localStorage.getItem(PK); return r ? JSON.parse(r) : {}; }
  catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem(PK, JSON.stringify(p));
  // Sync to server if logged in
  if (acctLoggedIn && acctToken) {
    fetch(JUDGE_URL + "/save-progress", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + acctToken
      },
      body: JSON.stringify({progress: p})
    }).catch(() => {});
  }
}
async function syncProgressFromServer() {
  if (!acctLoggedIn || !acctToken) return;
  try {
    const resp = await fetch(AUTH_URL + "/api/user", {
      headers: {"Authorization": "Bearer " + acctToken}
    });
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.logged_in && data.progress) {
      // Merge: server progress takes priority
      const local = loadProgress();
      const merged = {...local, ...data.progress};
      localStorage.setItem(PK, JSON.stringify(merged));
      // Also sync theme
      if (data.theme) {
        const current = localStorage.getItem(TK);
        if (!current || current === "dark") {
          document.documentElement.setAttribute("data-theme", data.theme);
          document.querySelector(".theme-btn").innerHTML = data.theme === "dark" ? "🌙" : "☀️";
          localStorage.setItem(TK, data.theme);
          document.getElementById("hljs-theme").href = data.theme === "dark"
            ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
            : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css";
        }
      }
    }
  } catch {}
}
function getStatus(pid) { return loadProgress()[pid] || "unstarted"; }
function setStatus(pid, status) {
  const p = loadProgress();
  if (status === "ac") p[pid] = "ac";
  else if (status === "read") { if (p[pid] !== "ac") p[pid] = "read"; }
  else delete p[pid];
  saveProgress(p);
  updateAllUI();
}
function stageProgress(sid) {
  const probs = allProblems.filter(p => p.stage === sid);
  const pg = loadProgress();
  const ac = probs.filter(p => pg[p.id] === "ac").length;
  return { total: probs.length, ac };
}
function totalProgress() {
  const pg = loadProgress();
  const ac = allProblems.filter(p => pg[p.id] === "ac").length;
  const read = allProblems.filter(p => pg[p.id] === "read").length;
  return { total: allProblems.length, ac, read };
}

// ═══ Theme ═══
const TK = "cpp-theme";
function toggleTheme() {
  const h = document.documentElement;
  const dark = h.getAttribute("data-theme") === "dark";
  const nt = dark ? "light" : "dark";
  h.setAttribute("data-theme", nt);

async function handleAuthSubmit() {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value;
  const errEl = document.getElementById("authError");
  const submitBtn = document.getElementById("authSubmit");

  if (!username || !password) {
    errEl.textContent = "请填写用户名和密码";
    errEl.classList.add("show");
    return;
  }

  if (authMode === "register") {
    const password2 = document.getElementById("authPassword2").value;
    if (password !== password2) {
      errEl.textContent = "两次密码不一致";
      errEl.classList.add("show");
      return;
    }
    if (password.length < 4) {
      errEl.textContent = "密码需至少 4 个字符";
      errEl.classList.add("show");
      return;
    }
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "处理中...";
  errEl.classList.remove("show");

  try {
    const endpoint = authMode === "register" ? "/api/register" : "/api/login";
    const resp = await fetch(AUTH_URL + endpoint, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username, password})
    });
    const data = await resp.json();

    if (!resp.ok || !data.success) {
      errEl.textContent = data.error || "操作失败";
      errEl.classList.add("show");
      return;
    }

    // Login success
    saveToken(data.token);
    acctUsername = data.username;
    acctLoggedIn = true;
    acctRole = data.role || "user";
    acctAiTrials = data.ai_trials || { used: 0, remaining: 3 };
    // Store membership from response
    if (data.membership && data.membership.member) {
      acctMember = true;
      acctMembershipInfo = data.membership;
    } else {
      acctMember = false;
      acctMembershipInfo = null;
    }
    updateAcctUI();
    closeAuthModal();

    // Merge server progress
    if (data.progress) {
      const local = loadProgress();
      const merged = {...local, ...data.progress};
      localStorage.setItem(PK, JSON.stringify(merged));
    }
    updateAllUI();
  } catch (e) {
    errEl.textContent = "无法连接服务器";
    errEl.classList.add("show");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = authMode === "login" ? "登录" : "注册";
  }
}

}

async function createMembershipOrder() {

async function pollOrderStatus(outTradeNo) {
  const msg = document.getElementById("memberPayMsg");
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    try {
      const resp = await fetch(AUTH_URL + "/api/orders/check", {
        method: "POST",
        headers: {"Content-Type":"application/json","Authorization":"Bearer "+acctToken},
        body: JSON.stringify({out_trade_no:outTradeNo})
      });
      const data = await resp.json();
      if (data.paid) {
        clearInterval(poll);
        acctMember = true;
        acctMembershipInfo = data.membership || {};
        updateAcctUI();
        msg.innerHTML = `<span style="color:var(--green)">支付成功！会员已激活</span>`;
        setTimeout(() => closeMembershipModal(), 2000);
      }
    } catch {}
    if (attempts > 60) { clearInterval(poll); msg.textContent = "支付状态检查超时，如已支付请刷新页面"; }
  }, 3000);
}

// ═══ Knowledge Map ═══
function drawMap() {
  const svg = document.getElementById("knowledgeMap");
  const W = 600, H = 68, nw = 52, nh = 28, gap = 22;
  const totalW = stageInfo.length * nw + (stageInfo.length - 1) * gap;
  const sx = Math.max(8, (W - totalW) / 2), y = 18;
  const pg = loadProgress();

  let arrows = "";
  for (let i = 1; i < stageInfo.length; i++) {
    const fx = sx + (i-1)*(nw+gap) + nw;
    const fy = y + nh/2;
    const tx = sx + i*(nw+gap);
    const ty = y + nh/2;
    arrows += `<line x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  }

  let nodes = "";
  stageInfo.forEach((si, i) => {
    const sp = stageProgress(si.id);
    const complete = sp.total > 0 && sp.ac === sp.total;
    const active = si.id === currentStage;
    const colorIdx = i % STAGE_COLORS.length;
    const barColor = STAGE_COLORS[colorIdx];
    const x = sx + i*(nw+gap);

    let fill, stroke, tfill;
    if (active) { fill = barColor; stroke = barColor; tfill = "#fff"; }
    else if (complete) { fill = "var(--green)"; stroke = "var(--green)"; tfill = "#fff"; }
    else { fill = "var(--surface2)"; stroke = "var(--border)"; tfill = "var(--text)"; }

    // Progress ring
    const pct = sp.total > 0 ? sp.ac / sp.total : 0;
    const r = nw/2 + 4, cx = x + nw/2, cy = y + nh/2;
    let ring = "";
    if (pct > 0 && !complete) {
      const circ = 2 * Math.PI * (r-1);
      const dashLen = circ * pct;
      ring = `<circle cx="${cx}" cy="${cy}" r="${r-1}" fill="none" stroke="${barColor}" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="${dashLen} ${circ - dashLen}" transform="rotate(-90 ${cx} ${cy})" opacity="0.3"/>`;
    } else if (complete) {
      ring = `<circle cx="${cx}" cy="${cy}" r="${r-1}" fill="none" stroke="var(--green)" stroke-width="2" opacity="0.2"/>`;
    }

    nodes += `<g class="map-node" onclick="switchStage(${si.id})" style="cursor:pointer">
      ${ring}
      <rect x="${x}" y="${y}" width="${nw}" height="${nh}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
      <text x="${x + nw/2}" y="${y + nh/2 + 4}" text-anchor="middle" fill="${tfill}" font-size="12" font-weight="700">S${si.id}</text>
    </g>`;
  });

  svg.innerHTML = arrows + nodes;
}

// ═══ Render Problems ═══
function renderProblems() {
  const q = (document.getElementById("searchInput").value || "").toLowerCase();
  let filtered = allProblems.filter(p => p.stage === currentStage);
  if (currentDiff !== "all") filtered = filtered.filter(p => p.difficulty === currentDiff);
  if (currentCategory !== "all") filtered = filtered.filter(p =>
    (p.category && p.category === currentCategory) ||
    (p.tags && p.tags.some(t => t === currentCategory))
  );
  if (q) filtered = filtered.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.tags.some(t => t.toLowerCase().includes(q)) ||
    (p.description||"").toLowerCase().includes(q)
  );

  const grid = document.getElementById("problemGrid");
  const empty = document.getElementById("emptyState");
  const si = stageInfo.find(s => s.id === currentStage);
  document.getElementById("sectionTitle").textContent = `阶段 ${currentStage} · ${si.name}`;

  if (filtered.length === 0) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  const pg = loadProgress();
  grid.innerHTML = filtered.map(p => {
    const dc = p.difficulty === "简单" ? "diff-easy" : p.difficulty === "中等" ? "diff-medium" : "diff-hard";
    const st = pg[p.id] || "unstarted";
    const sc = st === "ac" ? "status-ac" : st === "read" ? "status-read" : "";
    const sm = st === "ac" ? '<span class="status-marker ac">&#x2713; AC</span>' : "";
    const diffIcon = p.difficulty === "简单" ? "&#x1f7e2;" : p.difficulty === "中等" ? "&#x1f7e1;" : "&#x1f534;";
    return `<div class="problem-card ${sc}" onclick="openProblem(${p.id})">
      ${sm}
      <div class="card-header">
        <span class="card-id">#${String(p.id).padStart(2,"0")}</span>
        <span class="diff-badge ${dc}">${diffIcon} ${p.difficulty}</span>
      </div>
      <div class="card-title">${p.title}</div>
      <div class="card-meta">
        <span>&#x231b; ${p.timeComplexity||"?"}</span>
        <span>&#x1f4be; ${p.spaceComplexity||"?"}</span>
        ${p.category ? `<span>&#x1f4c2; ${p.category}</span>` : ""}
      </div>
      <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
    </div>`;
  }).join("");
}

function toggleSolution(btn) {
  const collapse = btn.nextElementSibling;
  const isOpen = collapse.classList.contains("expanded");
  if (isOpen) {
    collapse.classList.remove("expanded");
    btn.classList.remove("open");
    btn.setAttribute("aria-expanded", "false");
    btn.querySelector(".arrow").innerHTML = "&#x25b6;";
    btn.innerHTML = btn.innerHTML.replace("隐藏", "查看").replace("查看题解与思路解析", "查看题解与思路解析");

    collapse.classList.add("expanded");
    btn.classList.add("open");
    btn.setAttribute("aria-expanded", "true");
    btn.querySelector(".arrow").innerHTML = "&#x25bc;";
    btn.innerHTML = btn.innerHTML.replace("查看", "隐藏").replace("隐藏题解与思路解析", "隐藏题解与思路解析");
  }
}

function updateLineNumbers() {
  const editor = document.getElementById("judgeEditor");

  const lines = editor.value.split("\n").length;
  let nums = "";
  for (let i = 1; i <= Math.max(lines, 1); i++) nums += i + "\n";
  ln.textContent = nums;

}

// ═══ Judge ═══
async function submitCode(problemId) {
  const code = document.getElementById("judgeEditor").value.trim();
  if (!code) { alert("请先编写代码"); return; }

  const btn = document.querySelector(".judge-submit-btn");
  const status = document.getElementById("judgeStatus");
  const results = document.getElementById("judgeResults");
  btn.disabled = true;
  const origHtml = btn.innerHTML;
  btn.innerHTML = '<span class="ai-loading-spinner" style="width:14px;height:14px;border-width:1.5px"></span>判题中...';
  status.textContent = "";
  results.classList.remove("show");
  results.innerHTML = "";

  try {
    const resp = await fetch(JUDGE_URL + "/judge", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({code, problem_id: problemId})
    });
    const data = await resp.json();
    renderJudgeResults(data, problemId);
  } catch (e) {
    status.textContent = "无法连接判题服务器";
    const cvmLink = isCvm ? "" : '<p style="margin-top:12px;font-size:0.9em">请访问 <a href="http://82.156.34.78/cpp/" style="color:#60a5fa">http://82.156.34.78/cpp/</a> 使用完整判题功能</p>';
    results.innerHTML = `<div class="verdict-bar unknown"><span class="verdict-icon">&#x26a0;</span>判题服务暂不可用，请稍后重试${cvmLink}</div>`;
    results.classList.add("show");
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHtml;
  }
}

function renderJudgeResults(data, problemId) {
  const results = document.getElementById("judgeResults");
  const v = data.verdict || "UNKNOWN";
  const cls = v.toLowerCase();

  const icons = {ac:"&#x2705;", wa:"&#x274c;", tle:"&#x23f0;", mle:"&#x1f4be;", ce:"&#x26a0;", re:"&#x1f6a8;", unknown:"?"};
  const verdictLabel = data.verdict_label || v;

  let html = `<div class="verdict-bar ${cls}"><span class="verdict-icon">${icons[cls]||"?"}</span> ${verdictLabel}`;
  if (data.passed !== undefined) html += ` <span class="verdict-meta">${data.passed}/${data.total} 通过</span>`;
  html += `</div>`;

  if (v === "CE" && data.compile_error) {
    html += `<div class="ce-block">${escHtml(data.compile_error)}</div>`;
  }

  if (data.results && data.results.length > 0) {
    html += `<div class="verdict-details">`;
    data.results.forEach(r => {
      const rc = r.verdict.toLowerCase();
      const isSample = r.is_sample !== false;
      const label = isSample ? `样例 ${r.case_index}` : `隐藏 ${r.case_index}`;
      const lock = isSample ? '' : ' <span class="hidden-badge">隐藏</span>';
      html += `<div class="verdict-row ${isSample ? '' : 'hidden-row'}"><span class="v-dot ${rc}"></span><span class="v-label">${label}: ${r.verdict_label}${lock}</span><span class="v-time">${r.time_ms}ms</span></div>`;
      if (isSample) {
        if (r.verdict === "WA" && r.input) {
          html += `<div class="diff-block">
            <div class="d-label">输入</div><pre>${escHtml(r.input)}</pre>
            <div class="d-label">期望输出</div><pre class="expected">${escHtml(r.expected)}</pre>
            <div class="d-label">实际输出</div><pre class="actual">${escHtml(r.actual)}</pre>
          </div>`;
        }
        if ((r.verdict === "RE" || r.verdict === "TLE") && r.stderr) {
          html += `<div class="diff-block"><div class="d-label">错误信息</div><pre>${escHtml(r.stderr)}</pre></div>`;
        }
      } else {
        if (r.verdict === "WA") {
          html += `<div class="diff-block hidden-hint"><div class="d-label">提示</div><pre>隐藏测试用例未通过，请检查代码逻辑是否覆盖所有边界情况</pre></div>`;
        }
      }
    });
    html += `</div>`;
  }

  results.innerHTML = html;
  results.classList.add("show");

  if (v !== "AC") {
    const btnLabels = {"WA":"分析错误原因","TLE":"分析超时原因","MLE":"分析内存超限","CE":"分析编译错误","RE":"分析运行错误"};
    const label = btnLabels[v] || "AI 智能分析";
    const canAi = acctMember || (acctLoggedIn && acctAiTrials.remaining > 0);
    if (canAi) {
      let trialInfo = '';
      if (!acctMember && acctAiTrials.remaining > 0) {
        trialInfo = `<span style="font-size:11px;margin-left:6px;opacity:.8">剩余${acctAiTrials.remaining}次免费</span>`;
      }
      results.insertAdjacentHTML("beforeend", `<button class="ai-analyze-btn" id="aiAnalyzeBtn" onclick="requestAiAnalysis(${problemId},'${v}','${(data.verdict_label||'').replace(/'/g,"\\'")}')">${label}${trialInfo}</button>`);
    } else if (acctLoggedIn) {
      results.insertAdjacentHTML("beforeend", `<button class="ai-analyze-btn ai-analyze-locked" id="aiAnalyzeBtn" onclick="showMembershipModal()">开通会员解锁 AI 分析<span style="font-size:11px;margin-left:6px">(免费试用已用完)</span></button>`);
    } else {
      results.insertAdjacentHTML("beforeend", `<button class="ai-analyze-btn ai-analyze-locked" id="aiAnalyzeBtn" onclick="showAuthModal()">登录后使用 AI 分析</button>`);
    }
  }

  if (v === "AC" && data.passed === data.total) {
    setStatus(problemId, "ac");
    document.getElementById("judgeStatus").textContent = "已自动标记为通过";
  }
}

async function runCustomTest(problemId) {
  const code = document.getElementById("judgeEditor").value.trim();
  const input = document.getElementById("customInput").value;
  if (!code) { alert("请先在代码编辑器中编写代码"); return; }

  const status = document.getElementById("customStatus");
  const output = document.getElementById("customOutput");
  status.textContent = "运行中...";
  output.value = "";

  try {
    const resp = await fetch(JUDGE_URL + "/run", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({code, input})
    });
    const data = await resp.json();

    if (data.verdict === "CE") {
      output.value = "[编译错误]\n" + data.compile_error;
      status.textContent = "编译错误";
    } else if (data.verdict === "TLE") {
      output.value = "[运行超时]\n" + (data.stderr || "");
      status.textContent = `超时 (${data.time_ms}ms)`;
    } else if (data.verdict === "RE") {
      output.value = "[运行错误]\n" + (data.stderr || "");
      status.textContent = "运行错误";
    } else {
      output.value = data.stdout || "";
      status.textContent = `完成 (${data.time_ms}ms)`;
    }
  } catch (e) {
    status.textContent = "无法连接判题服务器";
    output.value = "判题服务暂不可用，请稍后重试";
  }
}

// ═══ AI Analysis ═══
let _lastAnalysisData = null;

async function requestAiAnalysis(problemId, verdict, verdictLabel) {
  if (!acctLoggedIn) { showAuthModal(); return; }
  if (!acctMember && acctAiTrials.remaining <= 0) { showMembershipModal(); return; }
  const code = document.getElementById("judgeEditor").value.trim();
  const resultsEl = document.getElementById("judgeResults");
  const panel = document.getElementById("aiPanel");
  const btn = document.getElementById("aiAnalyzeBtn");

  if (!code) { alert("请先编写代码"); return; }

  btn.disabled = true;
  const origHtml = btn.innerHTML;
  btn.innerHTML = '<span class="ai-loading-spinner"></span>AI 分析中...';
  panel.classList.add("show");
  panel.innerHTML = '<div class="ai-loading"><span class="ai-loading-spinner"></span>正在分析你的代码，请稍候...</div>';

  const verdictRows = resultsEl.querySelectorAll(".verdict-row");
  const results = [];
  verdictRows.forEach(row => {
    const label = row.querySelector(".v-label");
    const time = row.querySelector(".v-time");
    if (label) {
      const verdictMatch = label.textContent.match(/(AC|WA|TLE|MLE|RE|CE)/);
      results.push({
        case_index: results.length + 1,
        verdict: verdictMatch ? verdictMatch[1] : "UNKNOWN",
        time_ms: time ? time.textContent : "",
      });
    }
  });

  try {
    const headers = {"Content-Type": "application/json"};
    if (acctToken) headers["Authorization"] = "Bearer " + acctToken;
    const resp = await fetch(AUTH_URL + "/api/ai-analyze", {
      method: "POST",
      headers,
      body: JSON.stringify({code, problem_id: problemId, verdict, verdict_label: verdictLabel, results})
    });
    if (resp.status === 401) {
      panel.innerHTML = `<div class="ai-panel-section"><h4>需要登录</h4><div class="ai-diagnosis">AI 分析功能仅限登录用户使用。<br><button class="auth-submit" style="margin-top:12px;width:auto;padding:8px 20px" onclick="showAuthModal()">立即登录</button></div></div>`;
      return;
    }
    if (resp.status === 402) {
      panel.innerHTML = `<div class="ai-panel-section"><h4>次数用完</h4><div class="ai-diagnosis">免费试用次数已用完，开通会员即可无限使用 AI 分析。<br><button class="auth-submit" style="margin-top:12px;width:auto;padding:8px 20px;background:linear-gradient(135deg,#f59e0b,#eab308)" onclick="showMembershipModal()">开通会员</button></div></div>`;
      return;
    }
    const data = await resp.json();
    if (data.ai_trials) {
      acctAiTrials = data.ai_trials;
    }
    renderAnalysis(data);
  } catch (e) {
    panel.innerHTML = `<div class="ai-panel-section"><h4>&#x26a0; 错误</h4><div class="ai-diagnosis">AI 分析服务不可用: ${escHtml(e.message)}</div></div>`;
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = origHtml;
    }
  }
}

function renderAnalysis(data) {
  const panel = document.getElementById("aiPanel");
  panel.classList.add("show");

  if (!data.success) {
    panel.innerHTML = `<div class="ai-panel-section"><h4>&#x26a0; 错误</h4><div class="ai-diagnosis">${escHtml(data.error || '未知错误')}<br><small>AI 分析服务暂不可用，请稍后再试</small></div></div>`;
    return;
  }

  let html = '';

  if (data.analysis) {
    html += `<div class="ai-panel-section"><h4>&#x1f50d; 诊断</h4><div class="ai-diagnosis">${escHtml(data.analysis)}</div>`;
    if (data.missing_skills && data.missing_skills.length > 0) {
      html += `<div class="ai-skills">${data.missing_skills.map(s => `<span class="ai-skill-tag">${escHtml(s)}</span>`).join("")}</div>`;
    }
    html += `</div>`;
  }

  if (data.learning_tip) {
    html += `<div class="ai-tip">${escHtml(data.learning_tip)}</div>`;
  }

  if (data.practice && data.practice.title) {
    const p = data.practice;
    _lastAnalysisData = data;
    html += `<div class="ai-practice-card">`;
    html += `<h4>${escHtml(p.title)}</h4>`;
    html += `<div class="ai-practice-meta"><span>难度: ${escHtml(p.difficulty||'中等')}</span>`;
    if (p.tags) html += `<span>标签: ${escHtml(p.tags.join(', '))}</span>`;
    if (p.timeComplexity) html += `<span>${escHtml(p.timeComplexity)}</span>`;
    html += `</div>`;
    if (p.description) html += `<div class="ai-practice-desc">${escHtml(p.description.substring(0,300))}</div>`;
    if (p.hint) html += `<div class="ai-tip">提示: ${escHtml(p.hint)}</div>`;
    html += `<div class="ai-practice-actions">`;
    html += `<button class="ai-practice-btn" onclick="goToGeneratedProblem()">创建练习题并跳转</button>`;
    html += `</div></div>`;
  } else if (data.existing_problem_id) {
    _lastAnalysisData = data;
    html += `<div class="ai-practice-card">`;
    html += `<h4>已有相似题目 #${data.existing_problem_id}</h4>`;
    html += `<div class="ai-practice-desc">题库中已有匹配的练习题，点击下方按钮直接跳转到该题目进行训练。</div>`;
    html += `<div class="ai-practice-actions">`;
    html += `<button class="ai-practice-btn" onclick="goToGeneratedProblem()">跳转到已有题目</button>`;
    html += `</div></div>`;
  }

  panel.innerHTML = html;
}

async function goToGeneratedProblem() {
  if (!_lastAnalysisData || !_lastAnalysisData.practice) {
    if (_lastAnalysisData && _lastAnalysisData.existing_problem_id) {
      closeModal();
      setTimeout(() => openProblem(_lastAnalysisData.existing_problem_id), 200);
    }
    return;
  }

  const btn = document.getElementById("aiPracticeGoBtn");
  const origText = btn ? btn.textContent : "";
  if (btn) { btn.disabled = true; btn.textContent = "保存中..."; }

  try {
    const resp = await fetch(JUDGE_URL + "/save-generated-problem", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({problem: _lastAnalysisData.practice})
    });
    const data = await resp.json();

    if (data.success) {
      if (data.duplicate) {
        alert(data.message || "题库中已有相似题目");
        closeModal();
        setTimeout(() => openProblem(data.problem_id), 200);
        return;
      }

      const existingIds = new Set(allProblems.map(p => p.id));
      if (!existingIds.has(data.problem_id)) {
        allProblems.push(data.problem);
        const si = stageInfo.find(s => s.id === data.problem.stage);
        if (si) {
          si.count++;
        } else {
          stageInfo.push({id: data.problem.stage, name: data.problem.stageName || '综合练习', count: 1});
          stageInfo.sort((a,b) => a.id - b.id);
        }
      }
      updateAllUI();
      closeModal();
      setTimeout(() => openProblem(data.problem_id), 200);
    } else {
      alert("保存失败: " + (data.error || "未知错误"));
    }
  } catch (e) {
    alert("保存失败: " + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}

async function loadGeneratedProblems() {
  try {
    const resp = await fetch(JUDGE_URL + "/generated-problems");
    if (!resp.ok) return;
    const genProbs = await resp.json();
    if (!genProbs || genProbs.length === 0) return;

    const existingIds = new Set(allProblems.map(p => p.id));
    genProbs.forEach(gp => {
      if (!existingIds.has(gp.id)) {
        allProblems.push(gp);
        const si = stageInfo.find(s => s.id === gp.stage);
        if (si) {
          si.count++;
        } else if (gp.stage) {
          stageInfo.push({id: gp.stage, name: gp.stageName || '综合练习', count: 1});
          stageInfo.sort((a,b) => a.id - b.id);
        }
      }
    });
    updateAllUI();
  } catch(e) { /* ignore */ }
}

// ═══ Copy ═══
function copyCode(btn, pid) {
  const p = allProblems.find(p => String(p.id) === pid);
  if (!p || !p.cppCode) return;
  navigator.clipboard.writeText(p.cppCode).then(() => {
    btn.textContent = "已复制!"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "复制代码"; btn.classList.remove("copied"); }, 1500);
  }).catch(() => {
    const ta = document.createElement("textarea"); ta.value = p.cppCode;
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta);
    btn.textContent = "已复制!"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "复制代码"; btn.classList.remove("copied"); }, 1500);
  });
}

  document.querySelectorAll(".admin-tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`.admin-tab[data-admin-tab="${tab}"]`).classList.add("active");
  if (tab === "problems") loadAdminProblems();
  else if (tab === "contests") loadAdminContests();
  else if (tab === "users") loadAdminUsers();
}

async function adminAuthFetch(url, options = {}) {
  try {
    return await fetch(url, {
      ...options,
      headers: { ...(options.headers || {}), "Authorization": "Bearer " + acctToken }
    });
  } catch(e) {
    return { ok: false, json: async () => ({error: "网络错误"}) };
  }
}

// --- Problems ---
async function loadAdminProblems() {
  const body = document.getElementById("adminBody");
  if (adminEditMode) { showProblemEditor(); return; }
  try {
    const resp = await adminAuthFetch(AUTH_URL + "/api/admin/problems");
    const data = await resp.json();
    if (!resp.ok) { body.innerHTML = `<p style="color:var(--red)">加载失败: ${data.error}</p>`; return; }
    const probs = data.problems || [];
    body.innerHTML = `<div class="admin-toolbar">
      <button class="admin-table actions button primary" onclick="adminEditMode=true;adminEditId=null;showProblemEditor()">添加题目</button>
    </div>
    ${probs.length === 0 ? '<p style="color:var(--text2)">暂无自定义题目</p>' : `
      <table class="admin-table"><thead><tr><th>ID</th><th>标题</th><th>难度</th><th>类别</th><th>创建者</th><th>操作</th></tr></thead>
      <tbody>${probs.map(p => `
        <tr>
          <td>${p.id}</td><td>${escHtml(p.title)}</td>

          <td>${escHtml(p.created_by||'')}</td>

async function adminEditProblem(id) {
  adminEditMode = true; adminEditId = id;
  await showProblemEditor();
}

function showProblemEditor() {
  const body = document.getElementById("adminBody");
  const isEdit = adminEditId !== null;
  body.innerHTML = `<div class="admin-form" id="problemForm">
    <h3>${isEdit ? "编辑题目" : "新建题目"}</h3>
    <div><label>标题</label><input id="peTitle" placeholder="题目名称"></div>
    <div class="admin-form-row">
      <div><label>难度 (1-5)</label><select id="peDifficulty">${[1,2,3,4,5].map(d=>`<option value="${d}">${"★".repeat(d)}</option>`).join("")}</select></div>
      <div><label>类别</label><input id="peCategory" placeholder="如: dynamic-programming"></div>
    </div>
    <div><label>题目描述 (Markdown)</label><textarea class="tall" id="peDescription" placeholder="题目描述..."></textarea></div>
    <div class="admin-form-row">
      <div><label>输入描述</label><textarea id="peInputDesc" placeholder="输入格式..."></textarea></div>
      <div><label>输出描述</label><textarea id="peOutputDesc" placeholder="输出格式..."></textarea></div>
    </div>
    <div class="admin-form-row">
      <div><label>样例输入</label><textarea id="peSampleInput" placeholder="样例输入"></textarea></div>
      <div><label>样例输出</label><textarea id="peSampleOutput" placeholder="样例输出"></textarea></div>
    </div>
    <div><label>提示</label><textarea id="peHint" placeholder="提示信息..."></textarea></div>
    <div><label>题解思路</label><textarea class="tall" id="peSolutionText" placeholder="题解说明..."></textarea></div>
    <div><label>C++ 模板代码</label><textarea class="tall" id="peSolutionCode" placeholder="#include &lt;iostream&gt;..."></textarea></div>
    <div>
      <label>测试用例 (JSON)</label>
      <div class="testcase-editor" id="testCaseEditor"></div>
      <div class="admin-toolbar" style="margin-top:8px">
        <button onclick="addTestCase()" class="admin-table actions button">添加测试用例</button>
      </div>
    </div>
    <div class="admin-form-actions">
      <button class="btn-save" onclick="saveProblem()">保存</button>
      <button class="btn-cancel" onclick="adminEditMode=false;adminEditId=null;loadAdminProblems()">取消</button>
    </div>
  </div>`;
  if (isEdit) loadProblemData(adminEditId);
  else { window._testCases = [{input:"", output:""}]; renderTestCases(); }
}

async function loadProblemData(id) {
  const resp = await adminAuthFetch(AUTH_URL + "/api/admin/problems?id=" + id);
  const data = await resp.json();
  if (data.problem) {
    const p = data.problem;
    document.getElementById("peTitle").value = p.title || "";
    document.getElementById("peDifficulty").value = p.difficulty || 1;
    document.getElementById("peCategory").value = p.category || "";
    document.getElementById("peDescription").value = p.description || "";
    document.getElementById("peInputDesc").value = p.input_desc || "";
    document.getElementById("peOutputDesc").value = p.output_desc || "";
    document.getElementById("peSampleInput").value = p.sample_input || "";
    document.getElementById("peSampleOutput").value = p.sample_output || "";
    document.getElementById("peHint").value = p.hint || "";
    document.getElementById("peSolutionText").value = p.solution_text || "";
    document.getElementById("peSolutionCode").value = p.solution_code || "";
    window._testCases = p.test_cases || [{input:"", output:""}];
    renderTestCases();
  }
}

function addTestCase() {
  if (!window._testCases) window._testCases = [];
  window._testCases.push({input:"", output:""});
  renderTestCases();
}

function delTestCase(idx) {
  window._testCases.splice(idx, 1);
  if (window._testCases.length === 0) window._testCases = [{input:"", output:""}];
  renderTestCases();
}

function renderTestCases() {
  const el = document.getElementById("testCaseEditor");
  if (!el) return;
  const tcs = window._testCases || [];
  el.innerHTML = tcs.map((tc, i) => `
    <div class="testcase-row">
      <textarea placeholder="输入" onchange="window._testCases[${i}].input=this.value">${escHtml(tc.input||"")}</textarea>
      <textarea placeholder="期望输出" onchange="window._testCases[${i}].output=this.value">${escHtml(tc.output||"")}</textarea>
      <button onclick="delTestCase(${i})" class="admin-table actions button danger" style="margin-top:0">删除</button>
    </div>`).join("");
}

async function saveProblem() {
  const data = {
    title: document.getElementById("peTitle").value.trim(),
    difficulty: parseInt(document.getElementById("peDifficulty").value),
    category: document.getElementById("peCategory").value.trim(),
    description: document.getElementById("peDescription").value,
    input_desc: document.getElementById("peInputDesc").value,
    output_desc: document.getElementById("peOutputDesc").value,
    sample_input: document.getElementById("peSampleInput").value,
    sample_output: document.getElementById("peSampleOutput").value,
    hint: document.getElementById("peHint").value,
    solution_text: document.getElementById("peSolutionText").value,
    solution_code: document.getElementById("peSolutionCode").value,
    test_cases: window._testCases || []
  };
  if (!data.title) { alert("标题不能为空"); return; }

  const isEdit = adminEditId !== null;
  const method = isEdit ? "PUT" : "POST";
  const url = AUTH_URL + "/api/admin/problems" + (isEdit ? "?id=" + adminEditId : "");

  try {
    const resp = await adminAuthFetch(url, { method, headers: {"Content-Type":"application/json"}, body: JSON.stringify(data) });
    const result = await resp.json();
    if (resp.ok && result.success) {
      adminEditMode = false; adminEditId = null;
      loadAdminProblems();
    } else {
      alert("保存失败: " + (result.error || "未知错误"));
    }
  } catch(e) { alert("保存失败: 网络错误"); }
}

async function adminDeleteProblem(id) {
  if (!confirm("确定删除该题目？此操作不可撤销。")) return;
  try {
    const resp = await adminAuthFetch(AUTH_URL + "/api/admin/problems?id=" + id, { method: "DELETE" });
    const result = await resp.json();
    if (resp.ok && result.success) loadAdminProblems();
    else alert("删除失败: " + (result.error || "未知错误"));
  } catch(e) { alert("删除失败: 网络错误"); }
}

// --- Contests ---
async function loadAdminContests() {
  const body = document.getElementById("adminBody");
  if (adminEditMode) { showContestEditor(); return; }
  try {
    const resp = await adminAuthFetch(AUTH_URL + "/api/admin/contests");
    const data = await resp.json();
    if (!resp.ok) { body.innerHTML = `<p style="color:var(--red)">加载失败: ${data.error}</p>`; return; }
    const contests = data.contests || [];
    body.innerHTML = `<div class="admin-toolbar">
      <button class="admin-table actions button primary" onclick="adminEditMode=true;adminEditId=null;showContestEditor()">创建比赛</button>
    </div>
    ${contests.length === 0 ? '<p style="color:var(--text2)">暂无比赛</p>' : `
      <table class="admin-table"><thead><tr><th>ID</th><th>标题</th><th>开始时间</th><th>结束时间</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>${contests.map(c => {
        const start = new Date(c.start_time*1000).toLocaleString("zh-CN");
        const end = new Date(c.end_time*1000).toLocaleString("zh-CN");
        const now = Date.now()/1000;
        let status = "未开始";
        if (now >= c.start_time && now <= c.end_time) status = '<span style="color:var(--green)">进行中</span>';
        else if (now > c.end_time) status = '<span style="color:var(--text3)">已结束</span>';
        return `<tr>
          <td>${c.id}</td><td>${escHtml(c.title)}</td>
          <td style="font-size:12px">${start}</td>
          <td style="font-size:12px">${end}</td>
          <td>${c.is_active ? status : '<span style="color:var(--text3)">未激活</span>'}</td>
          <td class="actions">
            <button onclick="adminEditContest(${c.id})">编辑</button>
            <button onclick="adminToggleContest(${c.id},${c.is_active?0:1})">${c.is_active?'停用':'激活'}</button>
            <button class="danger" onclick="adminDeleteContest(${c.id})">删除</button>
          </td>
        </tr>`}).join("")}</tbody></table>`}`;
  } catch(e) { body.innerHTML = `<p style="color:var(--red)">加载失败</p>`; }
}

async function adminEditContest(id) {
  adminEditMode = true; adminEditId = id;
  await showContestEditor();
}

async function showContestEditor() {
  const body = document.getElementById("adminBody");
  const isEdit = adminEditId !== null;
  // Use built-in allProblems (50 problems), not D1 which may be empty
  const diffStars = { "简单": 1, "中等": 2, "困难": 3 };
  let problemCheckboxes = (allProblems || []).map(p => `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px">
      <input type="checkbox" value="${p.id}" class="contest-prob-cb"> ${escHtml(p.title)} (${"★".repeat(diffStars[p.difficulty] || 1)})
    </label>`).join("");
  if (!problemCheckboxes) problemCheckboxes = '<p style="color:var(--text2);font-size:13px">暂无可用题目</p>';

  body.innerHTML = `<div class="admin-form" id="contestForm">
    <h3>${isEdit ? "编辑比赛" : "创建比赛"}</h3>
    <div><label>比赛标题</label><input id="ceTitle" placeholder="比赛名称"></div>
    <div><label>描述</label><textarea id="ceDescription" placeholder="比赛描述..."></textarea></div>
    <div class="admin-form-row">
      <div><label>开始时间</label><input type="datetime-local" id="ceStartTime"></div>
      <div><label>结束时间</label><input type="datetime-local" id="ceEndTime"></div>
    </div>
    <div>
      <label>选择题目</label>
      <div style="max-height:200px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 14px;margin-bottom:8px">
        ${problemCheckboxes}
      </div>
    </div>
    <div class="admin-form-actions">
      <button class="btn-save" onclick="saveContest()">保存</button>
      <button class="btn-cancel" onclick="adminEditMode=false;adminEditId=null;loadAdminContests()">取消</button>
    </div>
  </div>`;

  if (isEdit) loadContestData(adminEditId);
}

async function loadContestData(id) {
  const resp = await adminAuthFetch(AUTH_URL + "/api/admin/contests?id=" + id);
  const data = await resp.json();
  if (data.contest) {
    const c = data.contest;
    document.getElementById("ceTitle").value = c.title || "";
    document.getElementById("ceDescription").value = c.description || "";
    if (c.start_time) document.getElementById("ceStartTime").value = new Date(c.start_time*1000).toISOString().slice(0,16);
    if (c.end_time) document.getElementById("ceEndTime").value = new Date(c.end_time*1000).toISOString().slice(0,16);
    (c.problem_ids || []).forEach(pid => {
      const cb = document.querySelector(`.contest-prob-cb[value="${pid}"]`);
      if (cb) cb.checked = true;
    });
  }
}

async function saveContest() {
  const problemIds = [...document.querySelectorAll(".contest-prob-cb:checked")].map(cb => parseInt(cb.value));
  const startStr = document.getElementById("ceStartTime").value;
  const endStr = document.getElementById("ceEndTime").value;
  const data = {
    title: document.getElementById("ceTitle").value.trim(),
    description: document.getElementById("ceDescription").value,
    start_time: startStr ? Math.floor(new Date(startStr).getTime()/1000) : 0,
    end_time: endStr ? Math.floor(new Date(endStr).getTime()/1000) : 0,
    problem_ids: problemIds,
    is_active: 0
  };
  if (!data.title) { alert("比赛标题不能为空"); return; }
  if (data.start_time >= data.end_time) { alert("结束时间必须晚于开始时间"); return; }

  const isEdit = adminEditId !== null;
  const method = isEdit ? "PUT" : "POST";
  const url = AUTH_URL + "/api/admin/contests" + (isEdit ? "?id=" + adminEditId : "");

  try {
    const resp = await adminAuthFetch(url, { method, headers: {"Content-Type":"application/json"}, body: JSON.stringify(data) });
    const result = await resp.json();
    if (resp.ok && result.success) {
      adminEditMode = false; adminEditId = null;
      loadAdminContests();
    } else {
      alert("保存失败: " + (result.error || "未知错误"));
    }
  } catch(e) { alert("保存失败: 网络错误"); }
}

async function adminToggleContest(id, active) {
  try {
    const resp = await adminAuthFetch(AUTH_URL + "/api/admin/contests?id=" + id, {
      method: "PUT", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ is_active: active })
    });
    const result = await resp.json();
    if (resp.ok && result.success) loadAdminContests();
    else alert("操作失败: " + (result.error || "未知错误"));
  } catch(e) { alert("操作失败: 网络错误"); }
}

async function adminDeleteContest(id) {
  if (!confirm("确定删除该比赛？所有相关提交数据也将被删除。")) return;
  try {
    const resp = await adminAuthFetch(AUTH_URL + "/api/admin/contests?id=" + id, { method: "DELETE" });
    const result = await resp.json();
    if (resp.ok && result.success) loadAdminContests();
    else alert("删除失败: " + (result.error || "未知错误"));
  } catch(e) { alert("删除失败: 网络错误"); }
}

// --- Users ---
async function loadAdminUsers() {
  const body = document.getElementById("adminBody");
  try {
    const resp = await adminAuthFetch(AUTH_URL + "/api/admin/users");
    const data = await resp.json();
    if (!resp.ok) { body.innerHTML = `<p style="color:var(--red)">加载失败: ${data.error}</p>`; return; }
    const users = data.users || [];
    body.innerHTML = `<table class="admin-table"><thead><tr><th>用户名</th><th>角色</th><th>注册时间</th><th>操作</th></tr></thead>
      <tbody>${users.map(u => {
        const created = new Date(u.created_at).toLocaleString("zh-CN");
        return `<tr>
          <td>${escHtml(u.username)}</td>
          <td>${u.role === "admin" ? '<span style="color:var(--purple)">管理员</span>' : '用户'}</td>
          <td style="font-size:12px">${created}</td>
          <td class="actions">
            ${u.role !== "admin" ? `<button onclick="adminPromoteUser('${u.username}','admin')">设为管理员</button>` : `<button class="danger" onclick="adminPromoteUser('${u.username}','user')">取消管理员</button>`}
          </td>
        </tr>`}).join("")}</tbody></table>`;
  } catch(e) { body.innerHTML = `<p style="color:var(--red)">加载失败</p>`; }
}

async function adminPromoteUser(username, role) {
  const msg = role === "admin" ? `确定将 ${username} 设为管理员？` : `确定取消 ${username} 的管理员权限？`;
  if (!confirm(msg)) return;
  try {
    const resp = await adminAuthFetch(AUTH_URL + "/api/admin/users", {
      method: "PUT", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({username, role})
    });
    const result = await resp.json();
    if (resp.ok && result.success) loadAdminUsers();
    else alert("操作失败: " + (result.error || "未知错误"));
  } catch(e) { alert("操作失败: 网络错误"); }
}
